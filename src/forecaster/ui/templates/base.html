<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}forecaster{% endblock %} · forecaster</title>
  <link rel="stylesheet" href="{{ url_for('ui-static', path='css/app.css') }}">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js" defer></script>
  <script src="{{ url_for('ui-static', path='js/app.js') }}" defer></script>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand"><span class="dot">●</span> forecaster</div>
    <nav class="tabs">
      <a href="{{ url_for('ui_overview') }}"  class="{% if active=='overview' %}active{% endif %}">Overview</a>
      <a href="{{ url_for('ui_instances') }}" class="{% if active=='instances' %}active{% endif %}">Instances</a>
      <a href="{{ url_for('ui_targets') }}"   class="{% if active=='targets' %}active{% endif %}">Targets</a>
      <a href="{{ url_for('ui_runs') }}"      class="{% if active=='runs' %}active{% endif %}">Runs</a>
      <a href="{{ url_for('ui_models') }}"    class="{% if active=='models' %}active{% endif %}">Models</a>
      <a href="{{ url_for('ui_trends') }}"    class="{% if active=='trends' %}active{% endif %}">Trends</a>
      <a href="{{ url_for('ui_compare') }}"   class="{% if active=='compare' %}active{% endif %}">Compare</a>
      <a href="{{ url_for('ui_schedule') }}"  class="{% if active=='schedule' %}active{% endif %}">Schedule</a>
      <a href="{{ url_for('ui_custom_run') }}" class="{% if active=='custom_run' %}active{% endif %}">Custom Run</a>
      <a href="{{ url_for('ui_manage_targets') }}" class="{% if active=='manage' %}active{% endif %}">Manage</a>
      <a href="{{ url_for('ui_config') }}"    class="{% if active=='config' %}active{% endif %}">Config</a>
    </nav>
    <span class="refresh-stamp">updated —</span>
    <a class="btn secondary" href="/docs" target="_blank">API docs</a>
  </header>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
