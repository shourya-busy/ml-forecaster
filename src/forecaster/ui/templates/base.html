<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}forecaster{% endblock %} · forecaster</title>
  <link rel="stylesheet" href="{{ url_for('ui-static', path='css/app.css') }}">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js" defer></script>
  <script src="{{ url_for('ui-static', path='js/app.js') }}" defer></script>
</head>
<body>
<div class="app-shell">
  {% include "_sidebar.html" %}
  <div class="app-main">
    <header class="topbar">
      <button class="sidebar-toggle" type="button" aria-label="Toggle navigation">☰</button>
      <div class="crumbs">
        {% block crumbs %}<span class="crumb-current">{{ self.title() }}</span>{% endblock %}
      </div>
      <div class="topbar-actions">
        <span class="refresh-stamp">updated —</span>
        <a class="btn btn-ghost btn-sm" href="/docs" target="_blank">API docs</a>
      </div>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
</body>
</html>
