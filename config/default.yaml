# ---- display timezone ----------------------------------------------------
# All UI timestamps and cron expressions below are interpreted in this
# timezone. Storage + JSON API stay UTC; this is presentation only.
display_timezone: "Asia/Kolkata"

# ---- horizons & their retrain cadences -----------------------------------
# step  = sampling step requested from Prometheus / Mimir
# horizon = total prediction horizon
# retrain = cron expression (5 fields, interpreted in display_timezone above)
horizons:
  short:
    step: "1min"
    horizon: "1h"
    retrain: "*/15 * * * *"
  medium:
    step: "5min"
    horizon: "24h"
    retrain: "0 * * * *"
  long:
    step: "1h"
    horizon: "7d"
    retrain: "0 2 * * *"

# ---- training ------------------------------------------------------------
training:
  lookback_days: 30
  backtest_folds: 5
  backtest_holdout_fraction: 0.1
  per_algo_lookback_override: {}    # e.g. {arima: 14, lstm: 60}
  parallelism:
    workers: 4
    algos_per_job: 4
    fetch_jitter_seconds: 30
  confidence_alpha: 0.05
  max_artifact_versions_kept: 3

# ---- algorithm registry --------------------------------------------------
algorithms:
  enabled:
    - naive
    - seasonal_naive
    - arima
    - ets
    - holt_winters
    - prophet
    - xgboost
    - lightgbm
    - lstm
    - nbeats
  defaults:
    seasonal_naive: {season_length: 288}      # 24h @ 5min
    arima: {max_p: 3, max_q: 3, seasonal: false}
    ets: {trend: "add", seasonal: null}
    holt_winters: {seasonal_periods: 288}
    prophet: {weekly_seasonality: true, daily_seasonality: true}
    xgboost: {n_estimators: 200, max_depth: 6, lags: 48}
    lightgbm: {n_estimators: 300, num_leaves: 31, lags: 48}
    lstm: {hidden_size: 32, num_layers: 1, epochs: 20, lags: 48, batch_size: 64}
    nbeats: {layer_size: 64, num_blocks: 2, epochs: 20, lags: 48, batch_size: 64}
  # Per-metric algorithm shortlist. Each list MUST be a subset of `enabled`
  # above. A metric absent from this map falls back to the full `enabled` set.
  # Rationale for the shipped defaults:
  #   cpu  → bursty + strong daily/weekly seasonality → drop pure-trend models
  #   mem  → slowly trending, mild seasonality → favour trend + smoothing models
  #   disk → near-monotonic growth → drop seasonal models that can't capture trend
  per_metric:
    cpu:  [seasonal_naive, holt_winters, prophet, xgboost, lightgbm, lstm, nbeats]
    mem:  [naive, arima, ets, prophet, xgboost, lstm]
    disk: [naive, arima, prophet, holt_winters]

# ---- ranking -------------------------------------------------------------
ranking:
  metrics: [mae, rmse, mape, smape, r2]
  weights: {mae: 0.25, rmse: 0.25, mape: 0.2, smape: 0.2, r2: 0.1}
  direction: {mae: min, rmse: min, mape: min, smape: min, r2: max}

# ---- what to forecast ----------------------------------------------------
# A PromQL expression per friendly metric name. Each query must return a
# per-instance series; the instance label maps to a server identity.
# Replace these with your real Netdata queries.
metrics_to_forecast:
  queries:
    # Total CPU utilization (%) per instance.
    # `netdata_system_cpu_percentage_average` is broken down by `dimension`
    # (user, system, nice, iowait, irq, softirq, steal, guest, idle, …) and
    # all dimensions sum to ~100%. Total CPU% = 100 - idle.
    # Already a gauge in [0, 100], so no rate() is needed.
    cpu:  '100 - sum by (instance) (netdata_system_cpu_percentage_average{dimension="idle"})'

    # TODO: replace with the right metric names for YOUR Netdata Prometheus
    # exporter. Run on the lgtm host:
    #   curl -sG http://<prom>:9090/api/v1/label/__name__/values \
    #     | jq -r '.data[]' | grep -E 'netdata.*(ram|mem|memory)' | sort
    # Expected shape: pick a gauge whose dimensions split memory into used /
    # free / cached / buffers (e.g. netdata_system_ram_MiB_average), then
    # compute used% as below. Verified pattern:
    mem:  '100 * sum by (instance) (netdata_system_ram_MiB_average{dimension="used"})
                / on(instance) group_left
                sum by (instance) (netdata_system_ram_MiB_average)'

    # Disk pressure (used GiB) per instance — simple gauge, monotonically
    # growing in steady state which suits the disk algorithm shortlist
    # (naive / arima / prophet / holt_winters).
    # NB: this is total used GiB across all mount points (max across them).
    # To switch to utilization%, you need to know your label naming. Find
    # available disk metrics with:
    #   curl -sG http://<prom>:9090/api/v1/label/__name__/values \
    #     | jq -r '.data[]' | grep -E 'netdata.*disk.*(space|util)' | sort
    # Then look at one series' labels with:
    #   curl -sG http://<prom>:9090/api/v1/query \
    #     --data-urlencode 'query=netdata_disk_space_GiB_average' | jq '.data.result[0].metric'
    # to find the right disk identifier label (often `family` or `chart`)
    # for a percentage formula.
    disk: 'max by (instance) (netdata_disk_space_GiB_average{dimension="used"})'

# ---- AI explainer (Ollama) ----------------------------------------------
# When enabled, the UI shows an "Explain (AI)" button on each forecast/explore
# chart. Clicking it ships a structured summary of the chart's data to an
# Ollama server, which returns a plain-English explanation.
#
# `base_url` points at any Ollama-compatible HTTP endpoint (default expects a
# container named `ollama` on the same docker network). Override via
# FORECASTER__AI__OLLAMA__BASE_URL or by editing this file. Set
# `ai.enabled: false` to hide the buttons entirely.
ai:
  enabled: true
  ollama:
    base_url: "http://ollama:11434"
    model: "llama3.2"
    timeout_seconds: 60
    max_points_in_prompt: 60
