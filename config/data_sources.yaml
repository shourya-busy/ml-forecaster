# Multiple endpoints can be defined; `active` selects which one to use.
# Switching from Prometheus to Mimir later is a one-line config change.
#
# Hostnames here are CONTAINER NAMES on the shared `lgtm` docker network
# (see the `networks:` block in docker-compose.yml). The api / worker /
# scheduler containers attach to that network and resolve `prometheus`,
# `mimir`, etc. by container DNS. If your LGTM containers use different
# names, override the hostnames below — or override LGTM_NETWORK in .env
# if they live on a different network than monitoring_default.
data_sources:
  active: prometheus_default
  endpoints:
    prometheus_default:
      kind: prometheus
      base_url: "http://prometheus:9090"
      timeout_seconds: 30
      verify_tls: true
    mimir_central:
      kind: mimir
      base_url: "http://mimir:9009/prometheus"
      timeout_seconds: 60
      tenant_id: "anonymous"     # change once your Mimir multi-tenancy is set up
      verify_tls: true
