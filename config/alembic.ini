[alembic]
# Package-relative path — alembic resolves this against the installed
# `forecaster` package via pkg_resources, so it works regardless of where
# the source tree lives (no /app/src checkout required in the runtime
# image). See https://alembic.sqlalchemy.org/en/latest/tutorial.html
script_location = forecaster:registry/migrations
prepend_sys_path = .
sqlalchemy.url = postgresql+psycopg://forecaster:forecaster@postgres:5432/forecaster

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
